kind = "web"
previewPath = "/"
title = "ClearSpeak AI"
version = "1.0.0"
id = "artifacts/clearspeak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22212

[services.development]
run = "pnpm --filter @workspace/clearspeak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clearspeak", "run", "build" ]
publicDir = "artifacts/clearspeak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22212"
BASE_PATH = "/"
