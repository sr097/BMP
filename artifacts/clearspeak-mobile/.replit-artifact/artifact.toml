kind = "mobile"
previewPath = "/mobile/"
title = "ClearSpeak Mobile"
version = "1.0.0"
id = "artifacts/clearspeak-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24673

[services.development]
run = "pnpm --filter @workspace/clearspeak-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clearspeak-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/clearspeak-mobile", "run", "serve" ]

[services.env]
PORT = "24673"
BASE_PATH = "/mobile/"
